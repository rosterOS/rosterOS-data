name: Scrape ADP Watchdog

on:
  schedule:
    # Run 2 hours after the scheduled scraper (13:00 UTC) to catch missed runs
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check if scraper ran successfully today
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RAN=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/scrape-adp.yml/runs?per_page=10" \
            --jq "[.workflow_runs[] | select(.created_at | startswith(\"$TODAY\")) | select(.conclusion == \"success\")] | length")
          if [ "$RAN" -eq 0 ]; then
            echo "trigger=true" >> "$GITHUB_OUTPUT"
            echo "Scraper did not run successfully today ($TODAY) — triggering now."
          else
            echo "trigger=false" >> "$GITHUB_OUTPUT"
            echo "Scraper already ran successfully today ($TODAY) — nothing to do."
          fi

      - name: Trigger scraper
        if: steps.check.outputs.trigger == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run scrape-adp.yml --repo "${{ github.repository }}"
